# This triggers the action whenever code is pushed or merged into the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the code from the main branch
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Run the official HubSpot deploy action
      - name: HubSpot Deploy Action
        uses: HubSpot/hubspot-cms-deploy-action@v2.0.1
        with:
          # The folder in your GitHub repo containing your theme files
          src_dir: . 
          
          # The exact name of the folder inside HubSpot's Design Manager where this should go
          dest_dir: /Publishable_Theme/FitMax-Free-Theme 
          
          account_id: ${{secrets.HUBSPOT_ACCOUNT_ID }}
          personal_access_key: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
